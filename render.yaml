services:
  - type: web
    name: kirti-thread-art-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DATABASE_URL
        sync: false      # paste your Neon connection string in Render dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: OWNER_WHATSAPP
        sync: false
      - key: UPI_ID
        sync: false
      - key: UPI_PAYEE_NAME
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false      # your Vercel URL, e.g. https://kirti-thread-art.vercel.app
      - key: NOTIFY_PROVIDER
        value: email
      - key: EMAIL
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
